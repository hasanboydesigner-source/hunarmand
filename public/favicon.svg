<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Brand Gold/Copper -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efc070" />
      <stop offset="100%" stop-color="#d4822a" />
    </linearGradient>
    
    <!-- Pottery Gradient: Clean Ivory/White -->
    <linearGradient id="potteryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fdf8f0" />
    </linearGradient>
    
    <!-- Soft shadow under the main icon -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#783d1b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded box -->
  <rect width="460" height="460" x="26" y="26" rx="110" fill="url(#bgGrad)" filter="url(#glow)"/>

  <!-- Stylized Uzbek Ceramic Pottery shape -->
  <g transform="translate(0, 5)">
    <!-- Main Jug Body -->
    <path fill="url(#potteryGrad)" d="
      M 256 100 
      C 285 100, 298 115, 298 135 
      C 298 160, 280 170, 280 190 
      L 280 205 
      C 340 215, 375 255, 375 315 
      C 375 385, 321 405, 256 405 
      C 191 405, 137 385, 137 315 
      C 137 255, 172 215, 232 205 
      L 232 190 
      C 232 170, 214 160, 214 135 
      C 214 115, 227 100, 256 100 
      Z
    " />
    
    <!-- Ceramic Handles -->
    <path fill="none" stroke="url(#potteryGrad)" stroke-width="14" stroke-linecap="round" d="
      M 226 195 
      C 170 195, 160 260, 192 285
      M 286 195 
      C 342 195, 352 260, 320 285
    " />

    <!-- Traditional Uzbek ceramic patterns & ornaments -->
    <!-- Pattern 1: Neck ring -->
    <path stroke="#b8651e" stroke-width="6" stroke-linecap="round" fill="none" d="M 238 185 L 274 185" />
    
    <!-- Pattern 2: Center floral ornament star -->
    <path fill="#b8651e" d="
      M 256 230 L 260 242 L 272 242 L 262 250 L 266 262 L 256 254 L 246 262 L 250 250 L 240 242 L 252 242 Z
    " />
    
    <!-- Pattern 3: Decorative wave/chevron lines at the bottom -->
    <path stroke="#b8651e" stroke-width="7" stroke-linecap="round" fill="none" d="
      M 195 295 Q 256 312 317 295
      M 175 328 Q 256 348 337 328
      M 190 358 Q 256 375 322 358
    " />
    
    <!-- Little dots -->
    <circle cx="225" cy="328" r="4.5" fill="#b8651e" />
    <circle cx="256" cy="331" r="4.5" fill="#b8651e" />
    <circle cx="287" cy="328" r="4.5" fill="#b8651e" />
  </g>
</svg>